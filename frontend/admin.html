<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SamvaadAI | Admin Command Center</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 24px;
    }
    
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    
    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
    }
    
    .panel-header {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .logs-container {
      max-height: 400px;
      overflow-y: auto;
      padding-right: 8px;
    }
    
    pre {
      font-family: inherit;
      white-space: pre-wrap;
      font-size: 0.9rem;
      color: var(--text-muted);
      background: var(--bg-main);
      padding: 12px;
      border-radius: 6px;
      margin-top: 8px;
    }
    
    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
  </style>
</head>
<body>

  <div class="admin-container">
    <div class="admin-header">
      <div>
        <h1 style="font-size: 2rem;">Command Center</h1>
        <p>Monitor scholarship eligibility engine in real-time.</p>
      </div>
      <a href="index.html" class="btn btn-outline" style="width: auto;">← Back to App</a>
    </div>

    <!-- Scholarship Database Manager -->
    <div class="panel" style="margin-bottom: 24px;">
      <div class="panel-header">
        <span style="color: var(--primary);">📚</span> Scholarship Database
      </div>
      
      <div style="display: flex; gap: 16px; margin-bottom: 24px;">
        <input type="text" id="new-name" placeholder="Scholarship Name" style="flex: 2;">
        <select id="new-category" style="flex: 1;">
          <option value="SC">SC</option>
          <option value="ST">ST</option>
          <option value="OBC">OBC</option>
          <option value="MINORITY">MINORITY</option>
          <option value="GENERAL">GENERAL</option>
        </select>
        <input type="number" id="new-income" placeholder="Max Income (₹)" style="flex: 1;">
        <input type="text" id="new-portal" placeholder="Portal URL" style="flex: 2;">
        <button onclick="addScholarship()" class="btn btn-primary" style="flex: 1;">Add New</button>
      </div>

      <div id="scholarships-list" class="logs-container" style="max-height: 250px;">Loading...</div>
    </div>

    <div class="grid-2">
      <!-- AI Decisions -->
      <div class="panel">
        <div class="panel-header">
          <span style="color: var(--success);">✅</span> AI Decisions Log
        </div>
        <div id="decision-logs" class="logs-container">Loading...</div>
      </div>

      <!-- Fraud Alerts -->
      <div class="panel">
        <div class="panel-header">
          <span style="color: var(--error);">🚨</span> Security & Fraud Alerts
        </div>
        <div id="fraud-logs" class="logs-container">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    async function loadData() {
      try {
        const [logsRes, fraudRes, scholarRes] = await Promise.all([
          fetch('http://127.0.0.1:8000/admin/logs'),
          fetch('http://127.0.0.1:8000/admin/fraud-cases'),
          fetch('http://127.0.0.1:8000/admin/scholarships')
        ]);
        
        const logs = await logsRes.json();
        const frauds = await fraudRes.json();
        const scholarships = await scholarRes.json();

        // Render Logs
        const logsDiv = document.getElementById('decision-logs');
        if(logs.length === 0) {
          logsDiv.innerHTML = '<p>No decisions logged yet.</p>';
        } else {
          logsDiv.innerHTML = logs.reverse().map(l => `
            <div class="list-item">
              <div class="list-item-header">
                <span class="badge ${l.eligible ? 'badge-success' : 'badge-error'}">
                  ${l.eligible ? 'ELIGIBLE' : 'NOT ELIGIBLE'}
                </span>
                <span style="font-size: 0.85rem; color: var(--text-muted);">
                  ${l.input.category} | ₹${l.input.income}
                </span>
              </div>
              <pre>${l.explanation}</pre>
            </div>
          `).join('');
        }

        // Render Fraud
        const fraudDiv = document.getElementById('fraud-logs');
        if(frauds.length === 0) {
          fraudDiv.innerHTML = '<p>No security alerts.</p>';
        } else {
          fraudDiv.innerHTML = frauds.reverse().map(f => `
            <div class="list-item">
              <div class="list-item-header">
                <span class="badge badge-error">FRAUD FLAG</span>
                <span style="font-size: 0.85rem; color: var(--text-muted);">
                  ${f.category} | ₹${f.income}
                </span>
              </div>
              <pre>Excessive Attempts: ${f.attempts}</pre>
            </div>
          `).join('');
        }

        // Render Scholarships
        const scholarDiv = document.getElementById('scholarships-list');
        if(scholarships.length === 0) {
          scholarDiv.innerHTML = '<p>No scholarships found.</p>';
        } else {
          scholarDiv.innerHTML = scholarships.map(s => `
            <div class="list-item">
              <div class="list-item-header">
                <div>
                  <strong>${s.name}</strong> <span class="badge badge-primary">${s.category}</span>
                  <div style="font-size: 0.85rem; color: var(--text-muted); margin-top: 4px;">Max Income: ₹${s.max_income} | <a href="${s.portal}" target="_blank" style="color: var(--primary); text-decoration: none;">View Portal →</a></div>
                </div>
                <button onclick="deleteScholarship('${s.name}')" class="btn btn-outline" style="padding: 6px 12px; font-size: 0.85rem; width: auto;">Delete</button>
              </div>
            </div>
          `).join('');
        }
      } catch (e) {
        document.getElementById('decision-logs').innerHTML = '<p style="color: var(--error);">Backend Offline</p>';
        document.getElementById('fraud-logs').innerHTML = '<p style="color: var(--error);">Backend Offline</p>';
        document.getElementById('scholarships-list').innerHTML = '<p style="color: var(--error);">Backend Offline</p>';
      }
    }

    async function addScholarship() {
      const payload = {
        name: document.getElementById('new-name').value,
        category: document.getElementById('new-category').value,
        max_income: parseInt(document.getElementById('new-income').value),
        portal: document.getElementById('new-portal').value
      };
      await fetch('http://127.0.0.1:8000/admin/scholarships', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      document.getElementById('new-name').value = '';
      document.getElementById('new-income').value = '';
      document.getElementById('new-portal').value = '';
      loadData();
    }

    async function deleteScholarship(name) {
      await fetch('http://127.0.0.1:8000/admin/scholarships/' + encodeURIComponent(name), {
        method: 'DELETE'
      });
      loadData();
    }

    loadData();
    setInterval(loadData, 5000); // Auto-refresh
  </script>
</body>
</html>
