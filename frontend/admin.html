<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SamvaadAI | Admin Command Center</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    .admin-container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    .log-item {
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 0.9rem;
      border-left: 4px solid var(--primary);
    }
    .fraud-item {
      border-left-color: #ef4444;
    }
    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      color: var(--text-muted);
      margin-top: 8px;
    }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .badge-eligible { background: rgba(16, 185, 129, 0.2); color: #10b981; }
    .badge-ineligible { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
  </style>
</head>
<body>
  <div class="background-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="admin-container">
    <div class="glass-card" style="max-width: 100%;">
      <div class="header">
        <h1>Command <span class="gradient-text">Center</span></h1>
        <p class="subtitle">System Analytics & Fraud Monitoring</p>
      </div>

      <div class="grid">
        <div>
          <h2 style="margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
            <span class="success-icon">📊</span> Decision Logs
          </h2>
          <div id="decision-logs">Loading...</div>
        </div>

        <div>
          <h2 style="margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
            <span class="error-icon">🚨</span> Fraud Alerts
          </h2>
          <div id="fraud-logs">Loading...</div>
        </div>
      </div>
    </div>
    
    <div class="glass-card" style="max-width: 100%; margin-top: 20px;">
      <div class="header">
        <h2><span class="gradient-text">Scholarship Database</span></h2>
      </div>
      
      <div style="margin-bottom: 20px; display: flex; gap: 10px;">
        <input type="text" id="new-name" placeholder="Name" style="flex: 2;">
        <select id="new-category" style="flex: 1;">
          <option value="SC">SC</option>
          <option value="ST">ST</option>
          <option value="OBC">OBC</option>
          <option value="MINORITY">MINORITY</option>
          <option value="GENERAL">GENERAL</option>
        </select>
        <input type="number" id="new-income" placeholder="Max Income" style="flex: 1;">
        <input type="text" id="new-portal" placeholder="URL" style="flex: 2;">
        <button onclick="addScholarship()" class="action-btn" style="flex: 1; margin-top: 0;">Add</button>
      </div>

      <div id="scholarships-list">Loading...</div>
    </div>
  </div>

  <script>
    async function loadData() {
      try {
        const [logsRes, fraudRes, scholarRes] = await Promise.all([
          fetch('http://127.0.0.1:8000/admin/logs'),
          fetch('http://127.0.0.1:8000/admin/fraud-cases'),
          fetch('http://127.0.0.1:8000/admin/scholarships')
        ]);
        
        const logs = await logsRes.json();
        const frauds = await fraudRes.json();
        const scholarships = await scholarRes.json();

        // Render Logs
        const logsDiv = document.getElementById('decision-logs');
        if(logs.length === 0) {
          logsDiv.innerHTML = '<p class="explanation">No decisions logged yet.</p>';
        } else {
          logsDiv.innerHTML = logs.reverse().map(l => `
            <div class="log-item">
              <span class="badge ${l.eligible ? 'badge-eligible' : 'badge-ineligible'}">
                ${l.eligible ? 'ELIGIBLE' : 'NOT ELIGIBLE'}
              </span>
              <div><strong>Category:</strong> ${l.input.category} | <strong>Income:</strong> ₹${l.input.income}</div>
              <pre>${l.explanation}</pre>
            </div>
          `).join('');
        }

        // Render Fraud
        const fraudDiv = document.getElementById('fraud-logs');
        if(frauds.length === 0) {
          fraudDiv.innerHTML = '<p class="explanation">No fraud detected.</p>';
        } else {
          fraudDiv.innerHTML = frauds.reverse().map(f => `
            <div class="log-item fraud-item">
              <span class="badge badge-ineligible">FRAUD FLAG</span>
              <div><strong>Category:</strong> ${f.category} | <strong>Income:</strong> ₹${f.income}</div>
              <pre>Attempts: ${f.attempts}</pre>
            </div>
          `).join('');
        }

        // Render Scholarships
        const scholarDiv = document.getElementById('scholarships-list');
        if(scholarships.length === 0) {
          scholarDiv.innerHTML = '<p class="explanation">No scholarships found.</p>';
        } else {
          scholarDiv.innerHTML = scholarships.map(s => `
            <div class="log-item" style="display: flex; justify-content: space-between; align-items: center;">
              <div>
                <strong>${s.name}</strong> (${s.category}) - Max Income: ₹${s.max_income}
                <br><a href="${s.portal}" target="_blank" style="color: var(--primary); font-size: 0.8rem;">${s.portal}</a>
              </div>
              <button onclick="deleteScholarship('${s.name}')" style="background: transparent; color: #ef4444; border: 1px solid #ef4444; border-radius: 4px; padding: 4px 8px; cursor: pointer;">Delete</button>
            </div>
          `).join('');
        }
      } catch (e) {
        document.getElementById('decision-logs').innerHTML = '<span class="error-icon">⚠️ Backend Offline</span>';
        document.getElementById('fraud-logs').innerHTML = '<span class="error-icon">⚠️ Backend Offline</span>';
        document.getElementById('scholarships-list').innerHTML = '<span class="error-icon">⚠️ Backend Offline</span>';
      }
    }

    async function addScholarship() {
      const payload = {
        name: document.getElementById('new-name').value,
        category: document.getElementById('new-category').value,
        max_income: parseInt(document.getElementById('new-income').value),
        portal: document.getElementById('new-portal').value
      };
      await fetch('http://127.0.0.1:8000/admin/scholarships', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      loadData();
    }

    async function deleteScholarship(name) {
      await fetch('http://127.0.0.1:8000/admin/scholarships/' + encodeURIComponent(name), {
        method: 'DELETE'
      });
      loadData();
    }

    loadData();
    setInterval(loadData, 5000); // Auto-refresh every 5s
  </script>
</body>
</html>
