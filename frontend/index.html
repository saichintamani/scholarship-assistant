<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SamvaadAI | Scholarship Eligibility</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <style>
    .auth-bar {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 10;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: var(--bg-card);
      padding: 32px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
    }
    .dashboard {
      display: none;
      margin-top: 24px;
      background: var(--bg-card);
      padding: 24px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
  </style>
</head>
<body style="position: relative;">

  <div id="particles-js" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;"></div>

  <!-- Top Bar -->
  <div class="auth-bar">
    <select id="language" class="form-control" style="width: auto; padding: 6px 12px; font-size: 0.9rem;">
      <option value="English">🇬🇧 English</option>
      <option value="Hindi">🇮🇳 Hindi</option>
      <option value="Marathi">🇮🇳 Marathi</option>
      <option value="Telugu">🇮🇳 Telugu</option>
    </select>
    <button id="login-btn" class="btn btn-outline" style="padding: 6px 16px; font-size: 0.9rem;" onclick="document.getElementById('auth-modal').style.display='flex'">Login</button>
    <button id="logout-btn" class="btn btn-outline" style="display: none; padding: 6px 16px; font-size: 0.9rem;" onclick="logout()">Logout</button>
  </div>

  <!-- HERO SECTION -->
  <section class="hero container" style="position: relative; z-index: 1;">
    <h1 style="color: var(--primary);">SamvaadAI</h1>
    <h2>Find Your Perfect Scholarship</h2>
    <p>Our AI-powered assistant analyzes your profile against national databases to instantly determine your eligibility.</p>
  </section>

  <!-- USER DASHBOARD (Hidden by default) -->
  <section class="container" style="position: relative; z-index: 1;">
    <div id="dashboard" class="dashboard">
      <h3 style="margin-bottom: 16px;">Welcome Back! 🎓</h3>
      <p style="color: var(--text-muted); margin-bottom: 16px;">Here are the scholarships you have saved for later:</p>
      <div id="saved-list"></div>
    </div>
  </section>

  <section class="container" style="position: relative; z-index: 1;">
    <form id="eligibility-form" class="card">
      <div class="form-group">
        <label>Category</label>
        <select id="category" class="form-control" required>
          <option value="SC">SC</option>
          <option value="ST">ST</option>
          <option value="OBC">OBC</option>
          <option value="MINORITY">MINORITY</option>
          <option value="GENERAL">GENERAL</option>
        </select>
      </div>

      <div class="form-group">
        <label>Annual Family Income (₹)</label>
        <input type="number" id="income" class="form-control" required>
      </div>

      <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="passed" checked>
        <label style="margin: 0;">Passed Previous Exam?</label>
      </div>

      <button type="submit" class="btn btn-primary">Check Eligibility with AI</button>
    </form>

    <div id="results" class="card" style="display: none; margin-top: 24px;"></div>
  </section>

  <!-- AUTHENTICATION MODAL -->
  <div id="auth-modal" class="modal">
    <div class="modal-content">
      <h2 style="margin-bottom: 16px;" id="auth-title">Login to SamvaadAI</h2>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="auth-email" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="auth-password" class="form-control" required>
      </div>
      <button class="btn btn-primary" onclick="submitAuth()" id="auth-submit-btn">Login</button>
      <p style="margin-top: 16px; font-size: 0.9rem; text-align: center; cursor: pointer; color: var(--primary);" onclick="toggleAuthMode()">Don't have an account? Sign Up</p>
      <p style="margin-top: 8px; font-size: 0.8rem; text-align: center; cursor: pointer;" onclick="document.getElementById('auth-modal').style.display='none'">Cancel</p>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    particlesJS("particles-js", {
      particles: {
        number: { value: 60, density: { enable: true, value_area: 800 } },
        color: { value: "#2563EB" },
        shape: { type: "circle" },
        opacity: { value: 0.3, random: false },
        size: { value: 3, random: true },
        line_linked: { enable: true, distance: 150, color: "#3B82F6", opacity: 0.2, width: 1 },
        move: { enable: true, speed: 2, direction: "none", random: false, straight: false, out_mode: "out", bounce: false }
      },
      interactivity: {
        detect_on: "canvas",
        events: { onhover: { enable: true, mode: "grab" }, onclick: { enable: true, mode: "push" }, resize: true },
        modes: { grab: { distance: 140, line_linked: { opacity: 0.5 } }, push: { particles_nb: 4 } }
      },
      retina_detect: true
    });
  </script>
</body>
</html>
